<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Chhath Puja</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(to top, #ff9933, #ffcc66, #ffff99);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: "Poppins", sans-serif;
  }

  h1 {
    font-size: 3em;
    color: #ff6600;
    text-shadow: 2px 2px 8px #fff;
    animation: glow 2s infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #ff6600, 0 0 30px #ff6600; }
    to { text-shadow: 0 0 20px #fff, 0 0 30px #ff9933, 0 0 40px #ff6600; }
  }

  .sun {
    position: absolute;
    top: 10%;
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, #ffcc00, #ff6600);
    border-radius: 50%;
    animation: rise 10s infinite alternate;
  }

  @keyframes rise {
    0% { top: 60%; }
    100% { top: 10%; }
  }

  .diya {
    position: absolute;
    bottom: 20px;
    width: 60px;
    height: 60px;
    background: url('https://i.imgur.com/NuIuFbt.png') no-repeat center/contain;
    animation: float 6s ease-in-out infinite;
  }

  .diya:nth-child(2) { left: 20%; animation-delay: 1s; }
  .diya:nth-child(3) { left: 50%; animation-delay: 3s; }
  .diya:nth-child(4) { left: 80%; animation-delay: 5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  .message {
    color: #fff;
    font-size: 1.5em;
    margin-top: 20px;
    text-align: center;
    text-shadow: 2px 2px 4px #000;
  }
</style>
</head>
<body>
  <div class="sun"></div>
  <h1>🌞 Happy Chhath Puja 🌞</h1>
  <div class="message">
    May the Sun God bless you with peace, prosperity, and happiness.<br>
    Wishing you and your family a blessed Chhath Puja!
  </div>

  <div class="diya"></div>
  <div class="diya"></div>
  <div class="diya"></div>
  <div class="diya"></div>
</body>
</html>
